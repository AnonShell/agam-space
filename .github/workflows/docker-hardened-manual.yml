name: Build Hardened Docker Image (Manual)

on:
  workflow_dispatch:

env:
  DOCKER_REGISTRY: docker.io
  IMAGE_NAME: agam-space

jobs:
  build-hardened:
    name: Build Hardened Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hardened Images (dhi.io)
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)

          DOCKERHUB_TAGS="${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:dev-hardened"
          GHCR_TAGS="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:dev-hardened"
          TAGS="${DOCKERHUB_TAGS},${GHCR_TAGS}"

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "version=dev-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "commit=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push Hardened Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api-server/Dockerfile
          target: runner-hardened
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
            BUILD_COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_ID=${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        run: |
          echo "Hardened image pushed with tags: ${{ steps.meta.outputs.tags }}"
