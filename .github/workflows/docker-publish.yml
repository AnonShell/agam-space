name: Build and Push Docker Images

on:
  # Triggered after CI workflow completes on main branch
  workflow_run:
    workflows: ['CI']
    types:
      - completed
    branches:
      - main
  # Triggered on version tags (bypasses CI wait)
  push:
    tags:
      - 'v*.*.*'

env:
  DOCKER_REGISTRY: docker.io
  IMAGE_NAME: agam-space

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    # Only run if CI passed (for workflow_run) or if it's a tag push
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # For workflow_run, checkout the commit that triggered CI
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          # Get short commit SHA
          SHORT_SHA=$(git rev-parse --short HEAD)

          # Check if this is a tag or branch push
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Tag push - use version from tag
            TAG_VERSION="${{ github.ref_name }}"
            VERSION="${TAG_VERSION#v}"
            
            # Docker Hub tags
            DOCKERHUB_TAGS="${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:${VERSION}"
            DOCKERHUB_TAGS="${DOCKERHUB_TAGS},${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:latest"
            
            # GitHub Container Registry tags
            GHCR_TAGS="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:${VERSION}"
            GHCR_TAGS="${GHCR_TAGS},ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:latest"
            
            # Build for both platforms on releases
            PLATFORMS="linux/amd64,linux/arm64"
          else
            # Branch push (main) - use 'dev' tag (overwrites each time)
            VERSION="dev-${SHORT_SHA}"
            
            # Docker Hub tags
            DOCKERHUB_TAGS="${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:dev"
            
            # GitHub Container Registry tags
            GHCR_TAGS="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:dev"
            
            # Build for ARM64 only on main branch (faster builds)
            PLATFORMS="linux/arm64"
          fi

          # Combined tags
          TAGS="${DOCKERHUB_TAGS},${GHCR_TAGS}"

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "commit=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "platforms=${PLATFORMS}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api-server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
            BUILD_COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_ID=${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ steps.meta.outputs.platforms }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Image digest
        run: echo "Image pushed with tags:${{ steps.meta.outputs.tags }}"
