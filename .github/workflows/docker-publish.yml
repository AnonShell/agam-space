name: Build and Push Docker Images

on:
  # Triggered after CI workflow completes on main branch
  workflow_run:
    workflows: ['CI']
    types:
      - completed
    branches:
      - main
  # Triggered on version tags (bypasses CI wait)
  push:
    tags:
      - 'v*.*.*'

env:
  DOCKER_REGISTRY: docker.io
  IMAGE_NAME: agam-space

jobs:
  # Check if relevant files changed (only for workflow_run events)
  check-changes:
    name: Check File Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run'
    outputs:
      should_build: ${{ steps.filter.outputs.should_build }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Check changed files
        id: filter
        run: |
          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Check if any relevant files changed
          if echo "$CHANGED_FILES" | grep -qE '^(apps/|packages/|Dockerfile|pnpm-lock.yaml|package.json|pnpm-workspace.yaml)'; then
            echo "Relevant files changed - will build Docker image"
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "No relevant files changed - skipping Docker build"
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    name: Build & Push Docker Images
    needs: [check-changes]
    if: |
      always() &&
      (
        (github.event_name == 'workflow_run' && 
         github.event.workflow_run.conclusion == 'success' && 
         needs.check-changes.outputs.should_build == 'true') ||
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # For workflow_run, checkout the commit that triggered CI
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_VERSION="${{ github.ref_name }}"
            VERSION="${TAG_VERSION#v}"
            
            # Multi-platform release - both ARM64 and AMD64
            DOCKERHUB_TAGS="${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:${VERSION}"
            DOCKERHUB_TAGS="${DOCKERHUB_TAGS},${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:latest"
            
            GHCR_TAGS="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:${VERSION}"
            GHCR_TAGS="${GHCR_TAGS},ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:latest"

            # Hardened image tags
            DOCKERHUB_HARDENED_TAGS="${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:${VERSION}-hardened"
            DOCKERHUB_HARDENED_TAGS="${DOCKERHUB_HARDENED_TAGS},${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:latest-hardened"
            
            GHCR_HARDENED_TAGS="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:${VERSION}-hardened"
            GHCR_HARDENED_TAGS="${GHCR_HARDENED_TAGS},ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:latest-hardened"

            PLATFORMS="linux/amd64,linux/arm64"
          else
            VERSION="dev-${SHORT_SHA}"
            DOCKERHUB_TAGS="${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:dev"
            GHCR_TAGS="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:dev"
            
            # Hardened image tags for dev
            DOCKERHUB_HARDENED_TAGS="${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:dev-hardened"
            GHCR_HARDENED_TAGS="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:dev-hardened"
            
            PLATFORMS="linux/amd64,linux/arm64"
          fi

          TAGS="${DOCKERHUB_TAGS},${GHCR_TAGS}"
          HARDENED_TAGS="${DOCKERHUB_HARDENED_TAGS},${GHCR_HARDENED_TAGS}"
          SCAN_TAG=$(echo "${DOCKERHUB_TAGS}" | cut -d',' -f1)

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "hardened_tags=${HARDENED_TAGS}" >> $GITHUB_OUTPUT
          echo "scan_tag=${SCAN_TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "commit=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "platforms=${PLATFORMS}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api-server/Dockerfile
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
            BUILD_COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_ID=${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ steps.meta.outputs.platforms }}

      - name: Build and push Hardened Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api-server/Dockerfile
          target: runner-hardened
          push: true
          tags: ${{ steps.meta.outputs.hardened_tags }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
            BUILD_COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_ID=${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ steps.meta.outputs.platforms }}

      - name: Run Trivy vulnerability scanner
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.scan_tag }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Image digest
        run: |
          echo "Normal image pushed with tags: ${{ steps.meta.outputs.tags }}"
          echo "Hardened image pushed with tags: ${{ steps.meta.outputs.hardened_tags }}"
