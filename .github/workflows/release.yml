name: Release

on:
  workflow_run:
    workflows: ['Build and Push Docker Images']
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create release for (e.g., v0.2.2)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Get tag name
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual trigger - use provided tag
            TAG_NAME="${{ github.event.inputs.tag }}"
            echo "Using manually provided tag: $TAG_NAME"
          else
            # Automatic trigger from workflow_run
            TAG_NAME=$(git describe --tags --exact-match ${{ github.event.workflow_run.head_sha }} 2>/dev/null || echo "")
            if [ -z "$TAG_NAME" ]; then
              echo "No tag found for this commit"
              exit 1
            fi
            echo "Found tag: $TAG_NAME"
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          CURRENT_TAG="${{ steps.get_tag.outputs.tag_name }}"
          PREVIOUS_TAG=$(git describe --abbrev=0 --tags ${CURRENT_TAG}^ 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            # First release - get all commits excluding docs and web-verifier scopes
            # Pattern: excludes any type(docs):, type(web-verifier):, docs(, web-verifier(
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges | grep -v "^- [a-z]*([[:space:]]*docs[[:space:]]*)" | grep -v "^- [a-z]*([[:space:]]*web-verifier[[:space:]]*)" || true)
          else
            # Get commits since previous tag, excluding docs and web-verifier scopes
            CHANGELOG=$(git log ${PREVIOUS_TAG}..${CURRENT_TAG} --pretty=format:"- %s (%h)" --no-merges | grep -v "^- [a-z]*([[:space:]]*docs[[:space:]]*)" | grep -v "^- [a-z]*([[:space:]]*web-verifier[[:space:]]*)" || true)
          fi

          # Fallback if no commits found
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- No user-facing changes in this release"
          fi

          # Save to file
          echo "$CHANGELOG" > CHANGELOG.txt

          # Also save to output (escaped for multiline)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract integrity manifest from Docker image
        run: |
          TAG_NAME="${{ steps.get_tag.outputs.tag_name }}"
          VERSION="${TAG_NAME#v}"
          IMAGE="agamspace/agam-space:${VERSION}"

          echo "📥 Pulling Docker image: ${IMAGE}"
          docker pull --platform linux/amd64 ${IMAGE}

          echo "📦 Creating temporary container"
          CONTAINER_ID=$(docker create ${IMAGE})
          echo "Container ID: ${CONTAINER_ID}"

          echo "📄 Extracting integrity manifest"
          docker cp ${CONTAINER_ID}:/app/public/integrity-manifest.json ./integrity-manifest.json

          echo "🧹 Cleaning up container"
          docker rm ${CONTAINER_ID}

          # Verify manifest exists and is valid
          if [ ! -f integrity-manifest.json ]; then
            echo "❌ Error: integrity-manifest.json not found in image"
            exit 1
          fi

          if ! jq empty integrity-manifest.json 2>/dev/null; then
            echo "❌ Error: integrity-manifest.json is not valid JSON"
            exit 1
          fi

          echo "✅ Successfully extracted integrity manifest"
          echo "Manifest hash: $(jq -r '.manifestHash' integrity-manifest.json | head -c 20)..."

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_tag.outputs.tag_name }}
          name: Release ${{ steps.get_tag.outputs.tag_name }}
          body: |
            ## 🚀 Agam Space ${{ steps.get_tag.outputs.tag_name }}

            ### Changes in this release:
            ${{ steps.changelog.outputs.changelog }}

            ### 📦 Docker Images

            **Docker Hub:**
            ```bash
            # Standard image
            docker pull agamspace/agam-space:${{ steps.get_tag.outputs.tag_name }}
            docker pull agamspace/agam-space:latest

            # Hardened image (recommended for production)
            docker pull agamspace/agam-space:${{ steps.get_tag.outputs.tag_name }}-hardened
            docker pull agamspace/agam-space:latest-hardened
            ```

            **GitHub Container Registry:**
            ```bash
            # Standard image
            docker pull ghcr.io/agam-space/agam-space:${{ steps.get_tag.outputs.tag_name }}
            docker pull ghcr.io/agam-space/agam-space:latest

            # Hardened image (recommended for production)
            docker pull ghcr.io/agam-space/agam-space:${{ steps.get_tag.outputs.tag_name }}-hardened
            docker pull ghcr.io/agam-space/agam-space:latest-hardened
            ```

            **Note:** This is a beta release. Always keep backups of your data.

            ---

            **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.changelog.outputs.previous_tag }}...${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: |
            integrity-manifest.json
