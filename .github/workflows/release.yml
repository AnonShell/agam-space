name: Release

on:
  workflow_run:
    workflows: ['Build and Push Docker Images']
    types:
      - completed
    branches-ignore:
      - '**'
  # Uncomment below to also allow manual release creation
  # workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch != 'main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Get tag name
        id: get_tag
        run: |
          # Get the tag that triggered the Docker build
          TAG_NAME=$(git describe --tags --exact-match ${{ github.event.workflow_run.head_sha }} 2>/dev/null || echo "")
          if [ -z "$TAG_NAME" ]; then
            echo "No tag found for this commit"
            exit 1
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Found tag: $TAG_NAME"

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          CURRENT_TAG="${{ steps.get_tag.outputs.tag_name }}"
          PREVIOUS_TAG=$(git describe --abbrev=0 --tags ${CURRENT_TAG}^ 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            # First release - get all commits
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            # Get commits since previous tag
            CHANGELOG=$(git log ${PREVIOUS_TAG}..${CURRENT_TAG} --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Save to file
          echo "$CHANGELOG" > CHANGELOG.txt

          # Also save to output (escaped for multiline)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_tag.outputs.tag_name }}
          name: Release ${{ steps.get_tag.outputs.tag_name }}
          body: |
            ## 🚀 Agam Space ${{ steps.get_tag.outputs.tag_name }}

            ### Changes in this release:
            ${{ steps.changelog.outputs.changelog }}

            ### 📦 Docker Images

            **Docker Hub:**
            ```bash
            docker pull agamspace/agam-space:${{ steps.get_tag.outputs.tag_name }}
            docker pull agamspace/agam-space:latest
            ```

            **GitHub Container Registry:**
            ```bash
            docker pull ghcr.io/agam-space/agam-space:${{ steps.get_tag.outputs.tag_name }}
            docker pull ghcr.io/agam-space/agam-space:latest
            ```

            ### 🔐 Security

            This is a beta release. Always keep backups of your data.

            ---

            **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.changelog.outputs.previous_tag }}...${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
