name: Feature Request
description: Suggest a new feature or enhancement
title: '[Feature]: '
labels: ['feature', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your suggestion! I appreciate you taking the time to share your ideas.

        **Please note:** This is a side project, so implementation timelines can vary based on availability and project priorities.

  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: What problem does this feature solve?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
      placeholder: A clear description of what you want to happen
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've thought about?
      placeholder: Other ways this could be solved

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would improve my workflow
        - Critical for my use case
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or examples
      placeholder: Add any other context about the feature

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I've searched existing issues for duplicates
          required: true
        - label: I understand this is a side project with no timeline
          required: true
