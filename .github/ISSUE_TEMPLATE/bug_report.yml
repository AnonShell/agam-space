name: Bug Report
description: Report a bug or issue with Agam Space
title: '[Bug]: '
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug!

        **Before opening an issue:**
        - Search existing issues to avoid duplicates
        - Make sure you're running the latest version

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of Agam Space are you running?
      placeholder: 'e.g., 0.1.0-beta, latest'
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      description: How are you running Agam Space?
      options:
        - Docker Compose
        - Docker (manual)
        - From source
        - Other (specify in description)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
      placeholder: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Any error messages or logs (check browser console and docker logs)
      render: shell
      placeholder: Paste logs here

  - type: dropdown
    id: browser
    attributes:
      label: Browser (if web UI bug)
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
        - N/A (backend issue)

  - type: textarea
    id: environment
    attributes:
      label: Environment Details
      description: OS, Node version, Docker version, etc.
      placeholder: |
        - OS: Ubuntu 22.04
        - Docker: 24.0.5
        - PostgreSQL: 15
        - Browser: Chrome 120

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I've searched existing issues for duplicates
          required: true
        - label: I'm running the latest version
          required: false
        - label: I've checked the documentation
          required: false
