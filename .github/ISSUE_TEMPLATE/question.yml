name: Question / Help
description: Ask a question or get help
title: '[Question]: '
labels: ['question']
body:
  - type: markdown
    attributes:
      value: |
        Have a question? Need help getting started?

        **Before asking:**
        - Check the [Documentation](https://agam-space.github.io/agam-space/)
        - Search existing issues

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What do you need help with?
      placeholder: Ask your question here
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What have you tried?
      description: What steps have you already taken?
      placeholder: |
        - Checked documentation
        - Tried X, Y, Z
        - Searched for similar issues

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Environment details, screenshots, etc.
      placeholder: Any additional information that might help

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I've checked the documentation
          required: true
        - label: I've searched existing issues
          required: true
